<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>Netlify MP3 Downloader</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0f19; color: white; text-align: center; padding: 50px; }
        .card { background: #161b22; padding: 30px; border-radius: 15px; max-width: 400px; margin: auto; border: 1px solid #30363d; }
        input { width: 90%; padding: 12px; margin: 20px 0; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; }
        button { background: #238636; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        #status { margin-top: 20px; color: #8b949e; }
    </style>
</head>
<body>

<div class="card">
    <h2>Netlify Scraper</h2>
    <input type="text" id="ytUrl" placeholder="YouTube Link එක මෙතනට...">
    <button onclick="downloadMusic()">Download MP3</button>
    <div id="status"></div>
</div>

<script>
async function downloadMusic() {
    const url = document.getElementById('ytUrl').value;
    const status = document.getElementById('status');
    status.innerText = "Processing via Netlify Functions...";

    try {
        // අපේ Netlify Function එකට Request එක යවනවා
        const response = await fetch('/.netlify/functions/download', {
            method: 'POST',
            body: JSON.stringify({ url: url })
        });

        const data = await response.json();

        if (data.url) {
            status.innerText = "Downloading...";
            window.location.href = data.url; // සින්දුව බාගත වීම ආරම්භ වේ
        } else {
            status.innerText = "Error: Could not get download link.";
        }
    } catch (e) {
        status.innerText = "Error: Server connection failed.";
    }
}
</script>

</body>
</html>
